name: Build Feed Be-Back VST3

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  PLUGIN_NAME: feed_be_back

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Build VST3
        run: cargo xtask bundle ${{ env.PLUGIN_NAME }} --release
      - name: Upload Windows VST3
        uses: actions/upload-artifact@v4
        with:
          name: feed-be-back-windows-vst3
          path: target/bundled/feed_be_back.vst3

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Install Linux Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libasound2-dev \
            libgl-dev \
            libx11-dev \
            libx11-xcb-dev \
            libxcb1-dev \
            libxcb-icccm4-dev \
            libxcb-render0-dev \
            libxcb-xfixes0-dev \
            libxcursor-dev \
            libxrandr-dev \
            libxi-dev \
            libxkbcommon-dev \
            libxkbcommon-x11-dev \
            libatk1.0-dev \
            libgtk-3-dev \
            libpango1.0-dev \
            libglib2.0-dev
      - name: Build VST3
        run: cargo xtask bundle ${{ env.PLUGIN_NAME }} --release
      - name: Upload Linux VST3
        uses: actions/upload-artifact@v4
        with:
          name: feed-be-back-linux-vst3
          path: target/bundled/feed_be_back.vst3

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-apple-darwin,aarch64-apple-darwin
      - name: Build VST3 (Apple Silicon)
        run: |
          cargo xtask bundle ${{ env.PLUGIN_NAME }} --release --target aarch64-apple-darwin
          mkdir -p target/aarch64-bundled
          cp -R target/bundled/feed_be_back.vst3 target/aarch64-bundled/
      - name: Build VST3 (Intel)
        run: |
          cargo xtask bundle ${{ env.PLUGIN_NAME }} --release --target x86_64-apple-darwin
          mkdir -p target/x86_64-bundled
          cp -R target/bundled/feed_be_back.vst3 target/x86_64-bundled/
        continue-on-error: true
      - name: Create Universal Binary (if both exist)
        run: |
          ARM_PATH="target/aarch64-bundled/feed_be_back.vst3/Contents/MacOS/feed_be_back"
          INTEL_PATH="target/x86_64-bundled/feed_be_back.vst3/Contents/MacOS/feed_be_back"
          UNIVERSAL_DIR="target/universal-bundled/feed_be_back.vst3"
          
          if [ -f "$ARM_PATH" ] && [ -f "$INTEL_PATH" ]; then
            echo "Creating Universal Binary..."
            mkdir -p target/universal-bundled
            cp -R target/aarch64-bundled/feed_be_back.vst3 target/universal-bundled/feed_be_back.vst3
            lipo -create "$ARM_PATH" "$INTEL_PATH" -output "$UNIVERSAL_DIR/Contents/MacOS/feed_be_back"
          elif [ -f "$ARM_PATH" ]; then
            echo "Using ARM-only build..."
            mkdir -p target/universal-bundled
            cp -R target/aarch64-bundled/feed_be_back.vst3 target/universal-bundled/feed_be_back.vst3
          elif [ -f "$INTEL_PATH" ]; then
            echo "Using Intel-only build..."
            mkdir -p target/universal-bundled
            cp -R target/x86_64-bundled/feed_be_back.vst3 target/universal-bundled/feed_be_back.vst3
          else
            echo "Error: Both ARM and Intel builds failed."
            exit 1
          fi
        continue-on-error: false
      - name: Upload macOS VST3
        uses: actions/upload-artifact@v4
        with:
          name: feed-be-back-macos-vst3
          path: target/universal-bundled/feed_be_back.vst3

  release:
    needs: [build-windows, build-linux, build-macos]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts

      - name: List artifacts
        run: find release-artifacts -type f

      - name: Package releases
        run: |
          cd release-artifacts
          [ -d "feed-be-back-windows-vst3" ] && zip -r ../Feed-Be-Back-Windows.zip feed-be-back-windows-vst3/ || echo "No Windows build"
          [ -d "feed-be-back-linux-vst3" ] && tar -czf ../Feed-Be-Back-Linux.tar.gz feed-be-back-linux-vst3/ || echo "No Linux build"
          [ -d "feed-be-back-macos-vst3" ] && zip -r ../Feed-Be-Back-macOS.zip feed-be-back-macos-vst3/ || echo "No macOS build"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: Feed Be-Back ${{ github.ref_name }}
          files: |
            Feed-Be-Back-Windows.zip
            Feed-Be-Back-Linux.tar.gz
            Feed-Be-Back-macOS.zip
